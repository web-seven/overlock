name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'blog/**'
    tags:
      # Plain semver releases only (e.g. 1.0.0, 1.2.3, 2.10.4).
      # Skip pre-release / build-metadata variants like 1.0.0-rc1 or 1.0.0+build.
      - '[0-9]*.[0-9]*.[0-9]*'
      - '!*-*'
      - '!*+*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Resolve release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Latest STABLE semver tag only (no pre-release / build-metadata).
            TAG=$(git describe --tags --abbrev=0 \
                    --match='[0-9]*.[0-9]*.[0-9]*' \
                    --exclude='*-*' \
                    --exclude='*+*' 2>/dev/null || echo "dev")
          fi
          DATE=$(git log -1 --format=%cs "$TAG" 2>/dev/null || date -u +%Y-%m-%d)
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Stamp release placeholders
        env:
          RELEASE: ${{ steps.release.outputs.tag }}
          DATE: ${{ steps.release.outputs.date }}
        run: |
          grep -rl --include='*.html' --include='*.js' '__RELEASE__\|__DATE__' docs/build \
            | xargs -r sed -i \
                -e "s/__RELEASE__/${RELEASE}/g" \
                -e "s/__DATE__/${DATE}/g"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
